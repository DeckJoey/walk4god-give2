<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Security Code — The Walk</title>
<style>
  :root{
    --ink:#F1F3F6;
    --paper:#06070a;
    --line:rgba(255,255,255,0.15);
    --muted:#9AA0AB;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:480px;
    padding:0 24px;
  }
  .back-link{
    display:inline-block;
    background:none;
    border:none;
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
    margin-bottom:24px;
    cursor:pointer;
    font-family:inherit;
    padding:0;
  }
  .back-link:hover{ color:var(--ink); }

  .eyebrow{
    font-size:13px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  h1{
    font-size:22px;
    font-weight:700;
    margin:0 0 12px;
  }
  .sub{
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
    margin:0 0 6px;
  }
  .sub b{ color:var(--ink); }
  .resend{
    color:var(--muted);
    text-decoration:underline;
    font-size:14px;
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    font-family:inherit;
    margin-bottom:28px;
  }
  .resend:disabled{ opacity:.5; cursor:not-allowed; }

  .field label{
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:10px;
  }
  input[type="text"]{
    width:100%;
    padding:16px;
    border:1px solid var(--line);
    border-radius:12px;
    background:transparent;
    color:var(--ink);
    font-size:20px;
    letter-spacing:0.3em;
    text-align:center;
    font-family:inherit;
  }
  input[type="text"]:focus{ outline:none; border-color:var(--ink); }

  .error-msg{
    margin-top:8px;
    font-size:13px;
    color:#e0665a;
    min-height:16px;
  }

  .next-btn{
    width:100%;
    padding:18px;
    border-radius:999px;
    border:none;
    background:var(--ink);
    color:#06070a;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;
    font-family:inherit;
  }
  .next-btn:disabled{ opacity:.4; cursor:not-allowed; }

  .status{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:14px;
    min-height:16px;
  }
</style>
</head>
<body>
  <div class="card">
    <button type="button" class="back-link" id="changeNumber">← Change your number</button>
    <div class="eyebrow">Verify your number</div>
    <h1>Enter your security code</h1>
    <p class="sub">We texted a code to <b id="phoneDisplay">your number</b>.</p>
    <button type="button" class="resend" id="resendBtn">Resend code</button>

    <div class="field">
      <label>Security code</label>
      <input type="text" id="code" maxlength="6" inputmode="numeric" placeholder="000000" autocomplete="one-time-code">
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <button type="button" class="next-btn" id="confirmBtn">Confirm</button>
    <div class="status" id="status"></div>
  </div>

<script>
(function(){
  var phone = sessionStorage.getItem('pendingPhone');
  var pending = sessionStorage.getItem('pendingGift');
  if(!phone || !pending){
    window.location.href = 'give.html';
    return;
  }

  // Format +11234567890 -> (123) 456-7890
  function formatPhone(e164){
    var digits = e164.replace(/\D/g, '').slice(-10);
    return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6);
  }
  document.getElementById('phoneDisplay').textContent = formatPhone(phone);

  var codeInput = document.getElementById('code');
  var confirmBtn = document.getElementById('confirmBtn');
  var errorMsg = document.getElementById('errorMsg');
  var status = document.getElementById('status');
  var resendBtn = document.getElementById('resendBtn');

  document.getElementById('changeNumber').addEventListener('click', function(){
    window.location.href = 'verify-phone.html';
  });

  resendBtn.addEventListener('click', async function(){
    resendBtn.disabled = true;
    status.textContent = 'Resending…';
    try {
      var res = await fetch('/.netlify/functions/send-verification', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ phone: phone })
      });
      var data = await res.json();
      status.textContent = data.ok ? 'Code resent.' : (data.error || 'Could not resend code.');
    } catch(err){
      status.textContent = 'Network error.';
    }
    setTimeout(function(){ resendBtn.disabled = false; }, 15000);
  });

  confirmBtn.addEventListener('click', async function(){
    var code = codeInput.value.replace(/\D/g, '');
    if(code.length < 4){
      errorMsg.textContent = 'Enter the code we texted you.';
      return;
    }
    errorMsg.textContent = '';
    confirmBtn.disabled = true;
    status.textContent = 'Confirming…';

    try {
      var verifyRes = await fetch('/.netlify/functions/check-verification', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ phone: phone, code: code })
      });
      var verifyData = await verifyRes.json();

      if(!verifyData.ok){
        errorMsg.textContent = verifyData.error || 'That code didn\'t match. Try again.';
        status.textContent = '';
        confirmBtn.disabled = false;
        return;
      }

      // Phone confirmed — now create the actual Stripe checkout session.
      status.textContent = 'Redirecting to secure checkout…';
      var giftPayload = JSON.parse(pending);
      giftPayload.phone = phone;

      var checkoutRes = await fetch('/.netlify/functions/create-checkout-session', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(giftPayload)
      });
      var checkoutData = await checkoutRes.json();

      if(checkoutData.url){
        sessionStorage.removeItem('pendingGift');
        sessionStorage.removeItem('pendingPhone');
        window.location.href = checkoutData.url;
      } else {
        status.textContent = checkoutData.error || 'Something went wrong starting checkout.';
        confirmBtn.disabled = false;
      }
    } catch(err){
      status.textContent = 'Network error. Please try again.';
      confirmBtn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
