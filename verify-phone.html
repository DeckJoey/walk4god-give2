<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Your Number — The Walk</title>
<style>
  :root{
    --ink:#F1F3F6;
    --paper:#06070a;
    --line:rgba(255,255,255,0.15);
    --muted:#9AA0AB;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:480px;
    padding:0 24px;
  }
  .back-link{
    display:inline-block;
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
    margin-bottom:24px;
  }
  .back-link:hover{ color:var(--ink); }

  .eyebrow{
    font-size:13px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:10px;
  }
  h1{
    font-size:22px;
    font-weight:700;
    margin:0 0 12px;
  }
  .sub{
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
    margin:0 0 28px;
  }

  .field label{
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:10px;
  }
  .phone-row{
    display:flex;
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .phone-row .cc{
    padding:16px 14px;
    color:var(--ink);
    font-weight:600;
    border-right:1px solid var(--line);
    white-space:nowrap;
  }
  .phone-row input{
    flex:1;
    padding:16px;
    border:none;
    background:transparent;
    color:var(--ink);
    font-size:16px;
    font-family:inherit;
  }
  .phone-row input:focus{ outline:none; }

  .error-msg{
    margin-top:8px;
    font-size:13px;
    color:#e0665a;
    min-height:16px;
  }

  .next-btn{
    width:100%;
    padding:18px;
    border-radius:999px;
    border:none;
    background:var(--ink);
    color:#06070a;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:28px;
    font-family:inherit;
  }
  .next-btn:disabled{ opacity:.4; cursor:not-allowed; }

  .status{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:14px;
    min-height:16px;
  }
  .disclaimer{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:20px;
    line-height:1.5;
  }
</style>
</head>
<body>
  <div class="card">
    <a href="give.html" class="back-link">← Back</a>
    <div class="eyebrow">Verify your number</div>
    <h1>Enter your mobile number</h1>
    <p class="sub">We'll text you a security code to confirm your gift.</p>

    <div class="field">
      <label>Mobile number</label>
      <div class="phone-row">
        <span class="cc">🇺🇸 +1</span>
        <input type="tel" id="phone" placeholder="(201) 555-0123" inputmode="tel" autocomplete="tel">
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <button type="button" class="next-btn" id="nextBtn">Next</button>
    <div class="status" id="status"></div>
    <p class="disclaimer">Message and data rates may apply. We only use your number to confirm this gift.</p>
  </div>

<script>
(function(){
  var pending = sessionStorage.getItem('pendingGift');
  if(!pending){
    // No gift in progress — send them back to start.
    window.location.href = 'give.html';
    return;
  }

  var phoneInput = document.getElementById('phone');
  var nextBtn = document.getElementById('nextBtn');
  var errorMsg = document.getElementById('errorMsg');
  var status = document.getElementById('status');

  function digitsOnly(str){ return (str || '').replace(/\D/g, ''); }

  nextBtn.addEventListener('click', async function(){
    var digits = digitsOnly(phoneInput.value);
    if(digits.length !== 10){
      errorMsg.textContent = 'Enter a valid 10-digit US mobile number.';
      return;
    }
    errorMsg.textContent = '';
    nextBtn.disabled = true;
    status.textContent = 'Sending code…';

    var e164 = '+1' + digits;

    try {
      var res = await fetch('/.netlify/functions/send-verification', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ phone: e164 })
      });
      var data = await res.json();
      if(data.ok){
        sessionStorage.setItem('pendingPhone', e164);
        window.location.href = 'verify-code.html';
      } else {
        status.textContent = data.error || 'Could not send code. Please try again.';
        nextBtn.disabled = false;
      }
    } catch(err){
      status.textContent = 'Network error. Please try again.';
      nextBtn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
